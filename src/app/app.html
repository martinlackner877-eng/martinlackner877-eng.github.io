<!-- ═══ FIXED LAYER (außerhalb des Smoothers) ═══ -->
<app-preloader (done)="onIntroDone()" />
<app-cursor />
<app-grain />
<app-page-transition />

<header class="nav">
  <a class="nav-logo" href="/" (click)="onLogo($event)" aria-label="Zur Startseite">
    ML<span class="nav-dot">.</span>
  </a>
  <span class="nav-chapter" aria-hidden="true">{{ motion.chapter() }}</span>
  <nav class="nav-links" aria-label="Hauptnavigation">
    <a href="#work" (click)="onAnchor($event, 'work')">Projekte</a>
    <a href="#about" (click)="onAnchor($event, 'about')">Über mich</a>
    <a href="#contact" (click)="onAnchor($event, 'contact')" class="nav-cta">Kontakt</a>
  </nav>
  <span class="nav-progress" aria-hidden="true"><span class="nav-progress-bar"></span></span>
</header>

<!-- ═══ GESCROLLTE BÜHNE ═══ -->
<div id="smooth-wrapper">
  <div id="smooth-content">
    <router-outlet />

    <footer class="footer">
      <span>© {{ year }} Martin Lackner</span>
      <span class="footer-note">Design &amp; Code: eigenhändig.</span>
    </footer>
  </div>
</div>
